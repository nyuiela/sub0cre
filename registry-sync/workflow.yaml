# CRE WORKFLOW SETTINGS — registry-sync
# Periodic sync of on-chain market state to Postgres backend cache.

staging-settings:
  user-workflow:
    workflow-name: "sub0cre-registry-sync"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

docker-settings:
  user-workflow:
    workflow-name: "sub0cre-registry-sync"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.docker.json"
    secrets-path: "../secrets.yaml"

production-settings:
  user-workflow:
    workflow-name: "sub0cre-registry-sync"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
